<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta
name="viewport"
content="width=device-width, initial-scale=1.0"

«»

<title>BarberOS</title><link
    rel="stylesheet"
    href="style.css"
><link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script></head><body><h1>BarberOS</h1><!-- LOGIN --><div id="login"><h2>Iniciar sesión</h2>

<input
    type="text"
    id="username"
    placeholder="Usuario"
>

<input
    type="password"
    id="password"
    placeholder="Contraseña"
>

<button id="btnIngresar">
    Ingresar
</button>

</div><!-- APP --><div id="app" style="display:none;"><!-- INICIO -->

<section id="inicio">

    <h2>Inicio</h2>

    <div class="card">

        <h3>Turnos ocupados hoy</h3>

        <p id="ocupadosHoy">0</p>

    </div>

    <div class="card">

        <h3>Turnos libres hoy</h3>

        <p id="libresHoy">0</p>

    </div>

    <div class="card">

        <h3>Ganancias hoy</h3>

        <p>
            $
            <span id="gananciasHoy">0</span>
        </p>

    </div>

</section>

<!-- AGENDA -->

<section
    id="agenda"
    class="seccion"
>

    <h2>Agenda</h2>

    <button id="btnNuevoTurno">
        + Nuevo turno
    </button>

    <div
        id="formTurno"
        style="display:none;"
    >

        <input
            type="text"
            id="cliente"
            placeholder="Nombre del cliente"
        >

        <input
            type="date"
            id="fecha"
        >

        <input
            type="time"
            id="hora"
        >

        <button id="btnGuardarTurno">
            Guardar turno
        </button>

    </div>

    <div id="listaTurnos"></div>

</section>

<!-- HISTORIAL -->

<section
    id="historial"
    class="seccion"
>

    <h2>Historial</h2>

    <div id="listaHistorial">

        <p>
            Aquí aparecerán los turnos completados,
            cancelados y los ingresos.
        </p>

    </div>

</section>

<!-- CONFIGURACION -->

<section
    id="configuracion"
    class="seccion"
>

    <h2>Configuración</h2>

    <input
        type="text"
        id="nombreBarberia"
        placeholder="Nombre de la barbería"
    >

    <input
        type="number"
        id="precioServicio"
        placeholder="Precio del servicio"
    >

    <button id="btnGuardarConfig">
        Guardar configuración
    </button>

</section>

<!-- MENU INFERIOR -->

<nav class="menu">

    <button id="btnInicio">

        <span class="material-symbols-outlined">
            home
        </span>

        <small>Inicio</small>

    </button>

    <button id="btnAgenda">

        <span class="material-symbols-outlined">
            calendar_month
        </span>

        <small>Agenda</small>

    </button>

    <button id="btnHistorial">

        <span class="material-symbols-outlined">
            bar_chart
        </span>

        <small>Historial</small>

    </button>

    <button id="btnConfiguracion">

        <span class="material-symbols-outlined">
            settings
        </span>

        <small>Config.</small>

    </button>

</nav>

</div><script src="app.js"></script></body></html>
