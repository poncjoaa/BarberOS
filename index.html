<!DOCTYPE html>
<html lang="es" translate="no">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BarberOS</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<!-- LOGIN -->
<div id="login">

    <div class="hero">
        <h1>BarberOS</h1>
        <p>Gestión de turnos</p>
    </div>

    <input id="username" placeholder="Usuario">
    <input id="password" type="password" placeholder="Contraseña">

    <button id="btnIngresar">Ingresar</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

    <!-- INICIO -->
    <section id="inicio">
        <h2>Inicio</h2>

        <div class="card">
            <p>Ocupados: <span id="ocupadosHoy">0</span></p>
            <p>Libres: <span id="libresHoy">0</span></p>
            <p>Ganancias: $<span id="gananciasHoy">0</span></p>
        </div>
    </section>

    <!-- AGENDA -->
    <section id="agenda" style="display:none;">
        <h2>Agenda</h2>

        <button id="btnNuevoTurno">+ Nuevo turno</button>

        <div id="formTurno" style="display:none;">
            <input id="cliente" placeholder="Cliente">
            <input id="fecha" type="date">
            <input id="hora" type="time">
            <button id="btnGuardarTurno">Guardar</button>
        </div>

        <div id="listaTurnos"></div>
    </section>

    <!-- HISTORIAL -->
    <section id="historial" style="display:none;">
        <h2>Historial</h2>

        <input type="date" id="fechaBusqueda">
        <button id="btnBuscarFecha">Buscar</button>

        <div id="resultadoFecha"></div>
    </section>

    <!-- CONFIG -->
    <section id="configuracion" style="display:none;">
        <h2>Configuración</h2>

        <input id="nombreBarberia" placeholder="Nombre">
        <input id="precioServicio" type="number" placeholder="Precio">

        <button id="btnGuardarConfig">Guardar</button>

        <hr>

        <input id="linkReservas" readonly>
        <button id="btnCopiarLink">Copiar link</button>
    </section>

    <!-- MENU -->
    <nav class="menu">
        <button id="btnInicio">Inicio</button>
        <button id="btnAgenda">Agenda</button>
        <button id="btnHistorial">Historial</button>
        <button id="btnConfiguracion">Config</button>
    </nav>

</div>

<script src="app.js"></script>
</body>
</html>
